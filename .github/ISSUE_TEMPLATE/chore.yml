name: Chore
description: Track maintenance, docs, build, or cleanup work
title: "[Chore]: "
labels: ["chore", "needs-refinement"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs to be maintained or cleaned up?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Done when
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: input
    id: verification
    attributes:
      label: Verification
      placeholder: npm.cmd run build

