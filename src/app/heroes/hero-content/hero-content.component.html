<main class="heroes-layout" [class.detail-modal-open]="isModalOpen">
  @if (hero; as selectedHero) {
    @if (!isModalOpen) {
      <aside
        class="hero-detail hero-detail-panel"
        [@fadeIn]
        [ngClass]="controller.roleClass(controller.heroRoleLabel(selectedHero))"
        aria-label="Selected hero details"
      >
        <button class="detail-pop-button" type="button" (click)="profileOpened.emit()">
          Open profile
        </button>
        @if (controller.roleAbilityKits(selectedHero).length > 0) {
          <app-hero-role-switcher
            [hero]="selectedHero"
            [controller]="controller"
          ></app-hero-role-switcher>
        }
        <app-hero-details [hero]="selectedHero" [controller]="controller"></app-hero-details>
      </aside>
    }
  }
  <aside class="hero-detail">
    <section class="video-searches" aria-label="YouTube videos for selected hero">
      <div class="section-heading">
        <h3>YouTube Videos</h3>
        <a [href]="youtubeUrl" target="_blank" rel="noopener noreferrer"> View all </a>
      </div>

      <div class="video-list">
        @for (video of videos; track video.label) {
          <article class="video-card">
            @if (video.embedUrl) {
              <iframe
                class="video-embed"
                [src]="video.embedUrl"
                [title]="(hero?.name ?? 'Selected hero') + ' ' + video.label"
                loading="lazy"
                allow="
                  accelerometer;
                  autoplay;
                  clipboard-write;
                  encrypted-media;
                  gyroscope;
                  picture-in-picture;
                  web-share;
                "
                allowfullscreen
              ></iframe>
            }
            <span class="video-copy">
              <strong>{{ video.label }}</strong>
              <small>{{ video.query }}</small>
              <a [href]="video.url" target="_blank" rel="noopener noreferrer">Open on YouTube</a>
            </span>
          </article>
        }
      </div>
    </section>
  </aside>
</main>
