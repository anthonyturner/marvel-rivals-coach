<section class="toolbar" aria-label="Hero filters">
  <label class="search-field">
    <span>Search heroes</span>
    <input
      type="search"
      placeholder="Name, strength, or note"
      [value]="searchTerm"
      (input)="updateSearch($event)"
    />
  </label>

  <div class="role-tabs" aria-label="Role filter">
    @for (role of roles; track role) {
      <button
        type="button"
        [class.active]="selectedRole === role"
        (click)="roleSelected.emit(role)"
      >
        {{ role }}
      </button>
    }
  </div>
</section>

<section class="hero-container">
  <div class="view-toggle" aria-label="Hero card layout">
    <button
      type="button"
      [class.active]="gridMode === 'rows'"
      (click)="gridModeSelected.emit('rows')"
    >
      Rows
    </button>
    <button
      type="button"
      [class.active]="gridMode === 'thumbs'"
      (click)="gridModeSelected.emit('thumbs')"
    >
      Thumbs
    </button>
  </div>

  <div class="hero-grid" [class.thumb-grid]="gridMode === 'thumbs'" aria-label="Hero list">
    @for (hero of heroes; track hero.id) {
      <button
        class="hero-card"
        type="button"
        [class.selected]="selectedHeroId === hero.id"
        (click)="heroSelected.emit(hero.id)"
      >
        <img class="hero-image" [src]="hero.imageUrl" [alt]="hero.name" />
        <span class="hero-card-copy">
          <span class="hero-card-topline">
            <strong>{{ hero.name }}</strong>
            <span class="role-pill" [class]="roleClass(heroRoleLabel(hero))">
              {{ heroRoleLabel(hero) }}
            </span>
          </span>
          <span>{{ hero.summary }}</span>
        </span>
      </button>
    } @empty {
      <div class="empty-state">
        <strong>No heroes found</strong>
        <span>Try a different search or role filter.</span>
      </div>
    }
  </div>
</section>
