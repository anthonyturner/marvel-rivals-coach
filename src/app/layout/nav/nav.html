<button class="menu-toggle" type="button" aria-label="Toggle navigation menu" aria-controls="primary-navigation"
    [attr.aria-expanded]="isMenuOpen()" (click)="toggleMenu()">
    <span class="menu-toggle-icon" aria-hidden="true"></span>
    <span class="menu-toggle-label">Menu</span>
</button>

<nav id="primary-navigation" aria-label="Primary navigation" [class.is-open]="isMenuOpen()">
    @for (item of primaryNavItems; track item.label) {
    @if (item.enabled) {
    <a class="nav-link" [routerLink]="item.path" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }" (click)="closeMenu()">
        {{ item.label }}
    </a>
    } @else {
    <span class="disabled">{{ item.label }}</span>
    }
    }
</nav>
